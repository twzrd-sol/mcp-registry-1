name: opik
image: mcp/opik
type: server
meta:
  category: devops
  tags:
    - opik
    - devops
about:
  title: Opik
  icon: https://avatars.githubusercontent.com/u/31487821?s=200&v=4
source:
  project: https://github.com/comet-ml/opik-mcp
  commit: 66987d34c9a2486d634cf0954b79b9f853338bf4
config:
  description: Configure the connection to Opik
  secrets:
    - name: opik.api_key
      env: OPIK_API_KEY
      example: your_api_key
  env:
    - name: OPIK_API_BASE_URL
      example: https://www.comet.com/opik/api
      value: "{{opik.api_base_url}}"
    - name: OPIK_WORKSPACE_NAME
      example: default
      value: "{{opik.workspace_name}}"
  parameters:
    type: object
    properties:
      api_base_url:
        type: string
      workspace_name:
        type: string
